<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUOYANCIS | Blackpalace AB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at 50% 0%, #0a1329 0%, #050A15 60%, #02040a 100%);
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .gold-text {
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }
        .matrix-border {
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 4rem;
            backdrop-filter: blur(10px);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="matrix-border">
        <h1 class="gold-text text-6xl mb-4">Blackpalace AB</h1>
        <p class="text-sm tracking-[0.4em] text-gray-400 uppercase">The Royal Matrix Activated</p>
        <div class="mt-8 h-[1px] w-24 bg-[#D4AF37] mx-auto opacity-50"></div>
        <p class="mt-8 text-xs italic text-gray-500">Dissolving the Tyranny of Experience.</p>
    </div>
</body>
</html>
